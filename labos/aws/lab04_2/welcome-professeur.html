<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Professeur — Page Nginx</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,700&f[]=cabinet-grotesk@800&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-text: #28251d;
      --color-text-muted: #7a7974;
      --color-primary: #01696f;
      --color-border: #d4d1ca;
      --font-display: 'Cabinet Grotesk', sans-serif;
      --font-body: 'Satoshi', sans-serif;
      --text-hero: clamp(3rem, 0.5rem + 7vw, 8rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --space-2: 0.5rem; --space-4: 1rem; --space-6: 1.5rem;
      --space-8: 2rem; --space-12: 3rem; --space-16: 4rem;
      --radius-full: 9999px;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-text: #cdccca;
      --color-text-muted: #797876;
      --color-primary: #4f98a3;
      --color-border: #393836;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body {
      min-height: 100dvh;
      font-family: var(--font-body), sans-serif;
      font-size: var(--text-base);
      color: var(--color-text);
      background-color: var(--color-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-8) var(--space-4);
      transition: background var(--transition), color var(--transition);
    }
    /* Theme toggle */
    .toggle {
      position: fixed; top: var(--space-4); right: var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      color: var(--color-text);
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition);
    }
    .toggle:hover { background: var(--color-border); }
    /* Card principale */
    .card {
      max-width: 700px;
      width: 100%;
      background: var(--color-surface);
      border: 1px solid oklch(from var(--color-text, #28251d) l c h / 0.10);
      border-radius: 1.5rem;
      padding: var(--space-12) var(--space-8);
      text-align: center;
      box-shadow: 0 4px 12px oklch(0.2 0.01 80 / 0.08), 0 24px 48px oklch(0.2 0.01 80 / 0.04);
    }
    /* Badge */
    .badge {
      display: inline-block;
      background: color-mix(in oklch, var(--color-primary) 15%, var(--color-surface));
      color: var(--color-primary);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 1rem;
      border-radius: var(--radius-full);
      margin-bottom: var(--space-6);
    }
    /* Logo SVG */
    .logo { margin: 0 auto var(--space-6); display: block; }
    /* Titre */
    h1 {
      font-family: var(--font-display), sans-serif;
      font-size: var(--text-hero);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: var(--space-6);
      background: linear-gradient(in oklch, var(--color-primary), color-mix(in oklch, var(--color-primary) 60%, var(--color-text)));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    /* Sous-titre */
    .subtitle {
      font-size: var(--text-xl);
      color: var(--color-text-muted);
      margin-bottom: var(--space-8);
      line-height: 1.4;
    }
    /* Divider */
    .divider {
      width: 48px; height: 3px;
      background: var(--color-primary);
      border-radius: var(--radius-full);
      margin: 0 auto var(--space-8);
      opacity: 0.6;
    }
    /* Info box */
    .info {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      justify-content: center;
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      background: color-mix(in oklch, var(--color-primary) 8%, var(--color-bg));
      border: 1px solid color-mix(in oklch, var(--color-primary) 20%, transparent);
      border-radius: 0.75rem;
      padding: var(--space-4) var(--space-6);
    }
    .info svg { flex-shrink: 0; color: var(--color-primary); }
    /* Footer */
    footer {
      margin-top: var(--space-8);
      font-size: 0.75rem;
      color: var(--color-text-muted);
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <button class="toggle" data-theme-toggle aria-label="Basculer le thème">🌙 Dark</button>

  <div class="card">

    <!-- Logo SVG custom -->
    <svg class="logo" width="56" height="56" viewBox="0 0 56 56" fill="none" aria-label="Logo formation Terraform">
      <rect width="56" height="56" rx="16" fill="currentColor" style="color: color-mix(in oklch, var(--color-primary) 18%, var(--color-surface))"/>
      <path d="M14 38 L22 18 L28 30 L34 20 L42 38" stroke="var(--color-primary)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="28" cy="20" r="3" fill="var(--color-primary)"/>
    </svg>

    <div class="badge">🎓 Formation Terraform</div>

    <h1>Bienvenue<br>Professeur</h1>

    <div class="divider"></div>

    <p class="subtitle">Votre serveur Nginx fonctionne<br>correctement sur AWS EC2.</p>

    <div class="info">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span>Instance déployée via <strong>Terraform</strong> · Région <strong>eu-west-3</strong> · Ubuntu 24.04 LTS</span>
    </div>

  </div>

  <footer>Cours TFV — Infrastructure as Code · Nginx {{nginx_version}}</footer>

  <script>
    (function(){
      const t = document.querySelector('[data-theme-toggle]');
      const r = document.documentElement;
      let d = r.getAttribute('data-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      r.setAttribute('data-theme', d);
      t.textContent = d === 'dark' ? '☀️ Light' : '🌙 Dark';
      t.addEventListener('click', () => {
        d = d === 'dark' ? 'light' : 'dark';
        r.setAttribute('data-theme', d);
        t.textContent = d === 'dark' ? '☀️ Light' : '🌙 Dark';
      });
    })();
  </script>

</body>
</html>
